name: golangci-lint

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  resolve-versions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      stable: ${{ steps.versions.outputs.GO_MINOR_VERSION_STABLE }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Determine Go versions
        id: versions
        uses: carabiner-dev/actions/go/versions@2a4b2cd115ede14629b03ef7e77586d3269d4c72 # main

  golangci:
    needs: resolve-versions
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ needs.resolve-versions.outputs.stable }}
          check-latest: true
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11
